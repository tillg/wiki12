# wiki12 server profile — runs the STOCK A12 Data Service fatjar in no-login mode.
#
# Baseline wiki12 defers authentication (proposal scope) and the web client has no
# login flow, but the stock Data Service requires UAA wiring. We therefore enable
# *backend* authentication that grants super-user privileges to every request
# (UAA docs §"backend.grant-super-user-privileges") instead of OAuth2/Keycloak.
# This is a QA/dev convenience, NOT a production posture (QA-LOG B5/B6).
#
# Activated together with the A12-provided profiles + the template's `shared`
# profile (see SPRING_PROFILES_ACTIVE in docker-compose). Datasource comes from
# env (SPRING_DATASOURCES_DATASERVICES_*).

server.port=8080
server.address=0.0.0.0

# --- model import (from the read-only mounted models dir) ---
mgmtp.a12.dataservices.initialization.import.models.enabled=true
mgmtp.a12.dataservices.initialization.import.models.path=file:/opt/wiki12/models/document-models,file:/opt/wiki12/models/form-models
# Overwrite existing models on each startup so edited models (e.g. the form-model
# subHeaderBox fix, QA-LOG B10) are re-imported.
mgmtp.a12.dataservices.initialization.import.models.overwrite.enabled=true

# --- no-login: backend super-user, no front-channel auth types (no OAuth2) ---
# Backend super-user grants every (unauthenticated) request full privileges, so
# the login-less client works. The stock server still wires a LocalUserManager, so
# we provide a single local user file purely to satisfy that bean (login is not
# enforced; LOCAL is dev-only — UAA docs). (QA-LOG B6)
# LOCAL auth (dev): the only login-less option (backend super-user is for
# scheduled jobs, not HTTP requests; anonymous HTTP needs a custom principal =
# custom Java). The agent/CLI logs in at /api/user/local/login to get a JWT; the
# web client gets the token injected by nginx (QA-LOG B7).
mgmtp.a12.uaa.authentication.types=LOCAL
mgmtp.a12.uaa.authentication.backend.enabled=true
mgmtp.a12.uaa.authentication.backend.grant-super-user-privileges.enabled=true
mgmtp.a12.uaa.authentication.principal.local-config.user-resources=file:/opt/wiki12/config/auth/users.yaml
# LOCAL/JWT token verifier needs a secret even though we don't enforce login.
# Dev-only secret (NOT for production).
mgmtp.a12.uaa.authentication.jwt.secret=G7JTTZjLrdyykwn8+CiJIKqhgxI61A8n7/QuheaYpzg=
# Long token lifetime (24h) so the nginx-injected QA token lasts a session (B7).
mgmtp.a12.uaa.authentication.jwt.expiration-seconds=86400
mgmtp.a12.uaa.authorization.security-on-startup.enabled=false
mgmtp.a12.uaa.authentication.principal.access-rights-resource=file:/opt/wiki12/config/auth/roles.yaml
mgmtp.a12.uaa.authorization.child-authorization-definitions=file:/opt/wiki12/config/auth/childAuthorizationDefinition.json
mgmtp.a12.uaa.authentication.context-path=/api
mgmtp.a12.uaa.authorization.web.context-path=/api
mgmtp.a12.uaa.authentication.cors.allowed-origins=*

# Don't gate model/document CRUD behind role authz for the baseline.
mgmtp.a12.dataservices.authorization.roleBased.enabled=false

# Content store shares the dataservices Postgres (embedded_contentstore profile).
spring.datasources.contentstore.url=${spring.datasources.dataservices.url}
spring.datasources.contentstore.username=${spring.datasources.dataservices.username}
spring.datasources.contentstore.password=${spring.datasources.dataservices.password}

# No seed-data import (we seed via the CLI).
mgmtp.a12.dataservices.seed-data.import.enabled=false
mgmtp.a12.dataservices.seed-data.delete.enabled=false
mgmtp.a12.dataservices.seed-data.export.enabled=false

# --- actuator health for the compose healthcheck ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.access=read_only
management.endpoint.health.probes.enabled=true
management.endpoints.web.base-path=/actuator
